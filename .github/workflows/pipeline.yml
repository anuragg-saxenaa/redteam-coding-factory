name: coding-factory-pipeline

on: [push, pull_request]

permissions:
  contents: read

jobs:
  workflow_governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: bash scripts/check-workflow-governance.sh

  llm_test_governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
      - run: bash scripts/check-llm-test-governance.sh

  lint_shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck -x scripts/*.sh

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm test

  factory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
      - run: npm ci
      - name: Create factory config
        run: |
          cat > factory.config.json << 'EOF'
          {
            "pipeline": "git",
            "version": "1.0.0",
            "tasks": ["build", "test"],
            "dataDir": "/tmp/factory-data",
            "repos": [
              {
                "name": "redteam-coding-factory",
                "path": ".",
                "branch": "main"
              }
            ],
            "enablePush": false,
            "createPR": false
          }
          EOF
      - name: Create tasks config
        run: |
          cat > tasks.json << 'EOF'
          {
            "build": {
              "description": "Build the project",
              "commands": ["npm install", "npm run build"]
            },
            "test": {
              "description": "Run tests",
              "commands": ["npm test"]
            }
          }
          EOF
      - name: Run factory
        run: node cli-entrypoint.js run --config factory.config.json --tasks tasks.json
